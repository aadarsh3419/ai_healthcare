<!DOCTYPE html>
<html>
<head>
    <title>Healthcare AI</title>
</head>
<body>

<h2>Enter Health Data</h2>

<form id="healthForm">
    <input type="number" placeholder="Weight" id="weight"><br><br>
    <input type="number" placeholder="BP" id="bp"><br><br>
    <input type="number" placeholder="Sugar" id="sugar"><br><br>
    <input type="number" placeholder="Sleep" id="sleep"><br><br>
    <input type="number" placeholder="Steps" id="steps"><br><br>

    <button type="submit">Submit</button>
</form>

<script>
document.getElementById("healthForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        weight: document.getElementById("weight").value,
        bp: document.getElementById("bp").value,
        sugar: document.getElementById("sugar").value,
        sleep: document.getElementById("sleep").value,
        steps: document.getElementById("steps").value
    };

    fetch("http://127.0.0.1:5000/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => alert(data.message || data.error));
});
</script>

</body>
</html>
