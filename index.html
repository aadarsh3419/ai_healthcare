<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwasthyaBot — AI Health Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --card: #1a2235;
  --border: #1e3a5f33;
  --accent: #00e5b0;
  --accent2: #3b82f6;
  --text: #e2e8f0;
  --muted: #4b6280;
  --danger: #ff4d6d;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 10% 10%, rgba(0,229,176,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 5;
  flex-shrink: 0;
}

.logo {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
}

.logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.logo p {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 3px;
}

.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  margin-right: 5px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Auth forms */
.auth-section {
  padding: 20px;
  flex: 1;
  overflow-y: auto;
}

.auth-section h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
}

.tab-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}

.tab {
  flex: 1;
  padding: 7px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  background: rgba(0,229,176,0.1);
  border-color: var(--accent);
  color: var(--accent);
}

.form-group { margin-bottom: 12px; }

.form-group label {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 9px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}

.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
}

.form-group select option { background: var(--card); }

.btn {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000;
}

.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.user-info {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.user-name { font-size: 0.85rem; font-weight: 500; }
.user-email { font-size: 0.7rem; color: var(--muted); }

.btn-logout {
  margin-left: auto;
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.72rem;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* ── MAIN CHAT ── */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 5;
  overflow: hidden;
}

.chat-header {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(17,24,39,0.8);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  gap: 12px;
}

.chat-header h2 {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1rem;
}

.chat-header p { font-size: 0.72rem; color: var(--muted); }

.disclaimer {
  background: rgba(255,77,109,0.08);
  border-bottom: 1px solid rgba(255,77,109,0.2);
  padding: 8px 24px;
  font-size: 0.7rem;
  color: #ff8fa3;
  text-align: center;
}

/* Quick chips */
.chips-row {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  background: rgba(10,14,26,0.6);
  scrollbar-width: none;
}
.chips-row::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }

/* Messages */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.msg-row {
  display: flex;
  gap: 10px;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  align-self: flex-end;
}

.msg-avatar.bot { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.msg-avatar.user { background: linear-gradient(135deg, var(--accent2), #8b5cf6); }

.bubble {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.875rem;
  line-height: 1.65;
}

.bubble.bot {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.bubble.user {
  background: linear-gradient(135deg, #1d4ed8, var(--accent2));
  border-bottom-right-radius: 4px;
  color: #fff;
}

.bubble.emergency {
  background: rgba(255,77,109,0.1);
  border-color: rgba(255,77,109,0.4);
  color: #ff8fa3;
}

.msg-time {
  font-size: 0.62rem;
  color: var(--muted);
  margin-top: 4px;
  text-align: right;
}

/* Typing indicator */
.typing-row { display: flex; gap: 10px; }
.typing-bubble {
  padding: 12px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  display: flex; gap: 5px; align-items: center;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%,60%,100% { transform: translateY(0); background: var(--muted); }
  30% { transform: translateY(-6px); background: var(--accent); }
}

/* Input area */
.input-area {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  background: rgba(17,24,39,0.95);
  backdrop-filter: blur(20px);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

#userInput {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.875rem;
  resize: none;
  outline: none;
  max-height: 120px;
  transition: border-color 0.2s;
  line-height: 1.5;
}

#userInput:focus { border-color: var(--accent); }
#userInput::placeholder { color: var(--muted); }
#userInput:disabled { opacity: 0.5; }

#sendBtn {
  width: 44px; height: 44px;
  border-radius: 11px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  font-weight: 700;
}
#sendBtn:hover { transform: scale(1.05); }
#sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Login required overlay */
.login-required {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  gap: 12px;
}

.login-required .icon { font-size: 3rem; }
.login-required p { font-size: 0.9rem; }

/* Error message */
.error-msg {
  background: rgba(255,77,109,0.1);
  border: 1px solid rgba(255,77,109,0.3);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.78rem;
  color: #ff8fa3;
  margin-top: 8px;
}

/* Success message */
.success-msg {
  background: rgba(0,229,176,0.1);
  border: 1px solid rgba(0,229,176,0.3);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.78rem;
  color: var(--accent);
  margin-top: 8px;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <h1>🩺 SwasthyaBot</h1>
    <p><span class="status-dot"></span>AI Health Assistant</p>
  </div>

  <!-- Auth Section -->
  <div class="auth-section" id="authSection">
    <h2>Account</h2>
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••">
      </div>
      <button class="btn btn-primary" onclick="login()">Login</button>
      <div id="loginError"></div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="regName" placeholder="Aadarsh Tiwari">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="••••••">
      </div>
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="regAge" placeholder="25">
      </div>
      <div class="form-group">
        <label>Gender</label>
        <select id="regGender">
          <option value="">Select</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="register()">Register</button>
      <div id="registerError"></div>
    </div>
  </div>

  <!-- User Info (shown after login) -->
  <div class="user-info hidden" id="userInfo">
    <div class="avatar">👤</div>
    <div>
      <div class="user-name" id="userName">—</div>
      <div class="user-email" id="userEmail">—</div>
    </div>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- CHAT AREA -->
<div class="chat-area">
  <div class="chat-header">
    <div>
      <h2>Health Consultation</h2>
      <p>Powered by AI + Medical Knowledge Base</p>
    </div>
  </div>

  <div class="disclaimer">
    ⚠️ Yeh ek AI chatbot hai — doctor ka replacement nahi. Emergency mein 112 call karein.
  </div>

  <!-- Login Required -->
  <div class="login-required" id="loginRequired">
    <div class="icon">🔐</div>
    <p>Please login to start chatting</p>
  </div>

  <!-- Chat Container (hidden until logged in) -->
  <div id="chatContainer" class="hidden" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="chips-row">
      <button class="chip" onclick="quickSend('Mujhe bukhar hai, kya karun?')">🌡️ Bukhar</button>
      <button class="chip" onclick="quickSend('Pet dard ho raha hai')">🤕 Pet dard</button>
      <button class="chip" onclick="quickSend('Khansi aur jukam ka upay batao')">🤧 Khansi</button>
      <button class="chip" onclick="quickSend('Neend nahi aati, kya karun?')">😴 Neend</button>
      <button class="chip" onclick="quickSend('BP high hai, kya khana chahiye?')">❤️ Blood Pressure</button>
      <button class="chip" onclick="quickSend('Diabetes diet plan batao')">🍽️ Diabetes</button>
      <button class="chip" onclick="quickSend('Sar dard ka ilaj')">🧠 Sar Dard</button>
      <button class="chip" onclick="quickSend('Wajan kam karne ke tarike')">⚖️ Weight Loss</button>
    </div>

    <div id="messages"></div>

    <div class="input-area">
      <textarea id="userInput" rows="1"
        placeholder="Apni health problem yahan likhein... (Hindi ya English)"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let token = localStorage.getItem('token') || null;
let user = JSON.parse(localStorage.getItem('user') || 'null');

// Init
window.onload = () => {
  if (token && user) showLoggedIn();
  else showLoggedOut();
  
  if (token) {
    addWelcomeMessage();
  }
};

function showLoggedIn() {
  document.getElementById('authSection').classList.add('hidden');
  document.getElementById('userInfo').classList.remove('hidden');
  document.getElementById('loginRequired').classList.add('hidden');
  document.getElementById('chatContainer').classList.remove('hidden');
  document.getElementById('userInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userName').textContent = user?.name || 'User';
  document.getElementById('userEmail').textContent = user?.email || '';
}

function showLoggedOut() {
  document.getElementById('authSection').classList.remove('hidden');
  document.getElementById('userInfo').classList.add('hidden');
  document.getElementById('loginRequired').classList.remove('hidden');
  document.getElementById('chatContainer').classList.add('hidden');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
  });
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
}

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.innerHTML = '';

  if (!email || !password) {
    errEl.innerHTML = '<div class="error-msg">Email aur password dono bharo</div>';
    return;
  }

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok) {
      errEl.innerHTML = `<div class="error-msg">${data.detail || 'Login failed'}</div>`;
      return;
    }

    token = data.token;
    user = data.user;
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify(user));
    showLoggedIn();
    addWelcomeMessage();
  } catch (e) {
    errEl.innerHTML = '<div class="error-msg">Server se connect nahi ho pa raha</div>';
  }
}

async function register() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const age = document.getElementById('regAge').value;
  const gender = document.getElementById('regGender').value;
  const errEl = document.getElementById('registerError');
  errEl.innerHTML = '';

  if (!name || !email || !password) {
    errEl.innerHTML = '<div class="error-msg">Name, email, password zaroori hain</div>';
    return;
  }

  try {
    const res = await fetch(`${API}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, age: age ? parseInt(age) : null, gender: gender || null })
    });

    const data = await res.json();
    if (!res.ok) {
      errEl.innerHTML = `<div class="error-msg">${data.detail || 'Registration failed'}</div>`;
      return;
    }

    token = data.token;
    user = data.user;
    localStorage.setItem('token', token);
    localStorage.setItem('user', JSON.stringify(user));
    showLoggedIn();
    addWelcomeMessage();
  } catch (e) {
    errEl.innerHTML = '<div class="error-msg">Server se connect nahi ho pa raha</div>';
  }
}

function logout() {
  token = null; user = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  document.getElementById('messages').innerHTML = '';
  showLoggedOut();
}

function addWelcomeMessage() {
  const msgs = document.getElementById('messages');
  if (msgs.children.length > 0) return;
  addBotMessage(`Namaste ${user?.name || ''}! 🙏 Main SwasthyaBot hun — aapka AI health assistant.\n\nAap mujhse kisi bhi health problem ke baare mein poochh sakte hain. Mujhe batayein, aaj kya takleef hai?`);
}

function getTime() {
  return new Date().toLocaleTimeString('hi-IN', { hour: '2-digit', minute: '2-digit' });
}

function addBotMessage(text, emergency = false) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar bot';
  avatar.textContent = '🩺';

  const bubble = document.createElement('div');
  bubble.className = `bubble bot${emergency ? ' emergency' : ''}`;
  bubble.innerHTML = text.replace(/\n/g, '<br>');

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();
  bubble.appendChild(time);

  row.appendChild(avatar);
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row user';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar user';
  avatar.textContent = '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();
  bubble.appendChild(time);

  row.appendChild(avatar);
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingRow';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar bot';
  avatar.textContent = '🩺';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text || !token) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  addUserMessage(text);
  showTyping();

  try {
    const res = await fetch(`${API}/api/chat/send`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    removeTyping();

    if (res.status === 401) {
      logout();
      addBotMessage('Session expire ho gayi. Please dobara login karein.');
      return;
    }

    if (!res.ok) {
      addBotMessage('Kuch error aa gaya. Please dobara try karein.');
      return;
    }

    addBotMessage(data.reply, data.is_emergency);
  } catch (e) {
    removeTyping();
    addBotMessage('Server se connect nahi ho pa raha. Please check karein ki server chal raha hai.');
  }

  btn.disabled = false;
  input.focus();
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
